# openocd.cfg — STM32H750B-DK debug configuration
#
# CPUTAPID override: STM32H750XBH6 Rev V reports 0x2ba01477.
# OpenOCD 0.12's stm32h7x.cfg defaults to 0x6ba02477 — override before source.
set CPUTAPID 0x2ba01477

# Disable QUADSPI bank probing — we flash with STM32_Programmer_CLI separately.
# Without this OpenOCD's auto_probe fails and GDB connection is rejected.
set QUADSPI 0

source [find board/stm32h750b-disco.cfg]

# Disable GDB memory map (avoids auto_probe failure on QSPI bank)
gdb_memory_map disable
gdb_flash_program disable

# GDB server on :3333 (default), telnet on :4444
$_CHIPNAME.cpu0 configure -event gdb-attach {
    halt
}
